<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>SPY Γ Monitor</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>

  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body,#root{height:100%;margin:0;padding:0;background:#06080C}
    ::-webkit-scrollbar{display:none}
    @keyframes pdot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
    @keyframes fdin{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    .pdot{animation:pdot 1.8s ease-in-out infinite}
    .fdin{animation:fdin .25s ease-out}
    .spin{animation:spin 1s linear infinite}
    .mono{font-family:'JetBrains Mono',ui-monospace,monospace;font-feature-settings:'tnum' 1}
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const {useState,useEffect,useMemo,useRef,useLayoutEffect,useCallback} = React;

const STRIKE_RANGE      = 10;
const VIS_COUNT         = STRIKE_RANGE * 2 + 1;
const PRICE_POLL_MS     = 5000;
const GEX_POLL_MS       = 30000;

function getExpDates() {
  const today = new Date();
  const fmt   = d => d.toISOString().slice(0,10);
  const add   = n => { const d=new Date(today); d.setDate(d.getDate()+n); return d; };
  const daysToFri = (5 - today.getDay() + 7) % 7 || 7;
  const monthly   = new Date(today.getFullYear(), today.getMonth()+1, 0);
  while (monthly.getDay() !== 5) monthly.setDate(monthly.getDate()-1);
  return {
    "0DTE":    fmt(today),
    "1DTE":    fmt(add(1)),
    "weekly":  fmt(add(daysToFri)),
    "next":    fmt(add(daysToFri+7)),
    "monthly": fmt(monthly),
  };
}

async function apiGet(path) {
  const r = await fetch(path);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

// Format large numbers as $X.XB / $X.XM
function fmtGEX(n) {
  if (n == null) return '—';
  const a = Math.abs(n);
  const sign = n >= 0 ? '+' : '−';
  if (a >= 1e9) return `${sign}$${(a/1e9).toFixed(1)}B`;
  if (a >= 1e6) return `${sign}$${(a/1e6).toFixed(0)}M`;
  if (a >= 1e3) return `${sign}$${(a/1e3).toFixed(0)}K`;
  return `${sign}$${a.toFixed(0)}`;
}

function App() {
  const EXP_DATES = useMemo(getExpDates, []);

  const [price,      setPrice]      = useState(null);
  const [openPrice,  setOpenPrice]  = useState(null);
  const [gammaData,  setGammaData]  = useState([]);
  const [exp,        setExp]        = useState('0DTE');
  const [showExp,    setShowExp]    = useState(false);
  const [priceOk,    setPriceOk]    = useState(false);
  const [gexStatus,  setGexStatus]  = useState('loading');
  const [gexErr,     setGexErr]     = useState('');
  const [lastTick,   setLastTick]   = useState(new Date());

  useEffect(() => {
    let alive = true;
    const poll = async () => {
      try {
        const {price:p, prevClose} = await apiGet('/api/price');
        if (!alive) return;
        if (p) { setPrice(p); setPriceOk(true); setLastTick(new Date()); }
        if (prevClose) setOpenPrice(c => c ?? prevClose);
      } catch { if (alive) setPriceOk(false); }
    };
    poll();
    const id = setInterval(poll, PRICE_POLL_MS);
    return () => { alive=false; clearInterval(id); };
  }, []);

  useEffect(() => {
    apiGet('/api/prevclose').then(({close}) => { if(close) setOpenPrice(c => c ?? close); }).catch(()=>{});
  }, []);

  const loadGEX = useCallback(async () => {
    setGexStatus('loading');
    setGexErr('');
    try {
      const expDate = EXP_DATES[exp];
      const {data, underlying} = await apiGet(`/api/gex?exp=${expDate}`);
      if (!data?.length) {
        setGexStatus('error');
        setGexErr("No greeks data — your Polygon plan may not include options greeks");
      } else {
        setGammaData(data);
        setGexStatus('ok');
        if (underlying) setPrice(p => p ?? underlying);
      }
    } catch(e) {
      setGexStatus('error');
      setGexErr(e.message ?? 'GEX fetch failed');
    }
  }, [exp]);

  useEffect(() => {
    loadGEX();
    const id = setInterval(loadGEX, GEX_POLL_MS);
    return () => clearInterval(id);
  }, [loadGEX]);

  const chartRef = useRef(null);
  const [chartH, setChartH] = useState(0);
  useLayoutEffect(() => {
    if (!chartRef.current) return;
    const ro = new ResizeObserver(([e]) => setChartH(e.contentRect.height));
    ro.observe(chartRef.current);
    return () => ro.disconnect();
  }, []);

  // Net Γ uses FULL expiration's strikes (walls/flip stay accurate)
  const netGamma = useMemo(() => gammaData.reduce((s,d)=>s+d.gamma,0), [gammaData]);

  const flipPoint = useMemo(() => {
    if (!gammaData.length) return null;
    const asc = [...gammaData].sort((a,b)=>a.strike-b.strike);
    let cum=0;
    for (let i=0;i<asc.length;i++) {
      cum += asc[i].gamma;
      if (cum>=0 && i>0) return asc[i].strike;
    }
    return asc[asc.length-1].strike;
  }, [gammaData]);

  const callWall = useMemo(() => {
    const pos = gammaData.filter(d=>d.gamma>0);
    return pos.length ? pos.reduce((m,d)=>d.gamma>m.gamma?d:m).strike : null;
  }, [gammaData]);

  const putWall = useMemo(() => {
    const neg = gammaData.filter(d=>d.gamma<0);
    return neg.length ? neg.reduce((m,d)=>d.gamma<m.gamma?d:m).strike : null;
  }, [gammaData]);

  // Zoom to ±10 strikes
  const visibleData = useMemo(() => {
    if (!gammaData.length) return [];
    const asc    = [...gammaData].sort((a,b)=>a.strike-b.strike);
    const anchor = Math.round(price ?? asc[Math.floor(asc.length/2)]?.strike ?? 0);
    return asc.filter(d => d.strike >= anchor - STRIKE_RANGE && d.strike <= anchor + STRIKE_RANGE).reverse();
  }, [gammaData, price]);

  // Scale bars to what's visible (no outlier compression)
  const maxAbs = useMemo(() =>
    Math.max(...visibleData.map(d=>Math.abs(d.gamma)),1),
    [visibleData]
  );

  const rowH = chartH > 0 ? chartH / VIS_COUNT : 14;

  const insights = useMemo(() => {
    if (!gammaData.length) return [];
    const callDist = (callWall&&price) ? (((callWall-price)/price)*100).toFixed(2) : null;
    const putDist  = (putWall &&price) ? (((price-putWall) /price)*100).toFixed(2) : null;
    const above    = flipPoint!=null && price!=null && price>flipPoint;
    return [
      netGamma>0
        ? {tag:'REGIME',tone:'pos', text:'Long Γ · vol suppressed · mean-revert'}
        : {tag:'REGIME',tone:'neg', text:'Short Γ · vol expansion · trend-amplified'},
      above
        ? {tag:'FLIP',tone:'neu',  text:`Above ${flipPoint} · dealers buy dips`}
        : {tag:'FLIP',tone:'warn', text:`Below ${flipPoint} · breakout risk both ways`},
      (callDist&&putDist)
        ? parseFloat(callDist)<parseFloat(putDist)
          ? {tag:'WALL',tone:'pos',text:`C·${callWall} caps +${callDist}% above`}
          : {tag:'WALL',tone:'neg',text:`P·${putWall} holds −${putDist}% below`}
        : {tag:'WALL',tone:'neu',text:'Awaiting price data…'},
    ];
  }, [price,netGamma,flipPoint,callWall,putWall,gammaData]);

  const change = (price!=null&&openPrice!=null) ? price-openPrice : null;
  const pct    = change!=null ? ((change/openPrice)*100).toFixed(2) : null;
  const isUp   = change!=null ? change>=0 : true;

  const exps = [
    {v:'0DTE',   l:'Today · 0DTE', s:EXP_DATES['0DTE']},
    {v:'1DTE',   l:'Tomorrow',     s:EXP_DATES['1DTE']},
    {v:'weekly', l:'Friday',       s:EXP_DATES['weekly']},
    {v:'next',   l:'Next Week',    s:EXP_DATES['next']},
    {v:'monthly',l:'Monthly',      s:EXP_DATES['monthly']},
  ];

  const toneStyle = t => ({
    pos:  {background:'rgba(52,211,153,.1)',  color:'#6ee7b7'},
    neg:  {background:'rgba(244,63,94,.1)',   color:'#fda4af'},
    warn: {background:'rgba(251,191,36,.1)',  color:'#fcd34d'},
    neu:  {background:'rgba(255,255,255,.06)',color:'#a1a1aa'},
  }[t] ?? {});

  return (
    <div style={{height:'100dvh',fontFamily:"'Outfit',system-ui,sans-serif",background:'#06080C',color:'#fff',display:'flex',flexDirection:'column',overflow:'hidden',position:'relative'}}>

      <div style={{position:'absolute',inset:0,pointerEvents:'none',overflow:'hidden'}}>
        <div style={{position:'absolute',top:-128,left:-64,width:288,height:288,background:'rgba(52,211,153,.04)',borderRadius:'50%',filter:'blur(60px)'}}/>
        <div style={{position:'absolute',bottom:-128,right:-64,width:288,height:288,background:'rgba(244,63,94,.04)',borderRadius:'50%',filter:'blur(60px)'}}/>
      </div>

      <div style={{position:'relative',maxWidth:448,margin:'0 auto',width:'100%',display:'flex',flexDirection:'column',height:'100%'}}>

        <div style={{flexShrink:0,padding:'16px 20px 8px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <div className="pdot" style={{width:6,height:6,borderRadius:'50%',background:priceOk?'#34d399':'#fbbf24'}}/>
            <span style={{fontSize:10,color:'#d4d4d8',textTransform:'uppercase',letterSpacing:'.2em',fontWeight:500}}>{priceOk?'Live':'Connecting'}</span>
            <span style={{fontSize:10,color:'#3f3f46',margin:'0 2px'}}>·</span>
            <span className="mono" style={{fontSize:10,color:'#a1a1aa',fontWeight:600}}>SPY</span>
            {gexStatus==='loading' && (
              <svg className="spin" width="10" height="10" viewBox="0 0 10 10" style={{marginLeft:4}}>
                <circle cx="5" cy="5" r="4" fill="none" stroke="#52525b" strokeWidth="1.2" strokeDasharray="18" strokeDashoffset="6" strokeLinecap="round"/>
              </svg>
            )}
          </div>
          <span className="mono" style={{fontSize:10,color:'#52525b'}}>
            {lastTick.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'})}
          </span>
        </div>

        <div style={{flexShrink:0,padding:'0 20px 8px'}}>
          <button onClick={()=>setShowExp(true)} style={{width:'100%',background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.06)',borderRadius:12,padding:'8px 12px',display:'flex',alignItems:'center',justifyContent:'space-between',cursor:'pointer',color:'#fff'}}>
            <div style={{textAlign:'left'}}>
              <div style={{fontSize:8,color:'#71717a',textTransform:'uppercase',letterSpacing:'.15em'}}>Expiration</div>
              <div style={{fontSize:12,fontWeight:500}}>{exps.find(e=>e.v===exp)?.l}</div>
            </div>
            <svg width="9" height="9" viewBox="0 0 10 10" fill="none"><path d="M2 4l3 3 3-3" stroke="#71717a" strokeWidth="1.5" strokeLinecap="round"/></svg>
          </button>
        </div>

        <div style={{flexShrink:0,padding:'0 20px 4px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <div style={{width:4,height:4,borderRadius:'50%',background:'#f43f5e'}}/>
            <span style={{fontSize:8,color:'#71717a',textTransform:'uppercase',letterSpacing:'.15em'}}>Puts</span>
          </div>
          <span style={{fontSize:8,color:'#3f3f46',textTransform:'uppercase',letterSpacing:'.15em'}}>Net Γ · $/1% · ±{STRIKE_RANGE}</span>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <span style={{fontSize:8,color:'#71717a',textTransform:'uppercase',letterSpacing:'.15em'}}>Calls</span>
            <div style={{width:4,height:4,borderRadius:'50%',background:'#34d399'}}/>
          </div>
        </div>

        <div ref={chartRef} style={{flex:1,padding:'0 8px',overflow:'hidden'}}>

          {gexStatus==='loading' && gammaData.length===0 && (
            <div style={{height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:12}}>
              <svg className="spin" width="24" height="24" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10" fill="none" stroke="#3f3f46" strokeWidth="2" strokeDasharray="50" strokeDashoffset="20" strokeLinecap="round"/>
              </svg>
              <span className="mono" style={{fontSize:10,color:'#52525b',textTransform:'uppercase',letterSpacing:'.1em'}}>Loading options data…</span>
            </div>
          )}

          {gexStatus==='error' && gammaData.length===0 && (
            <div style={{height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:12,padding:'0 24px',textAlign:'center'}}>
              <div style={{width:6,height:6,borderRadius:'50%',background:'#f43f5e'}}/>
              <span className="mono" style={{fontSize:10,color:'#71717a'}}>{gexErr}</span>
              <button onClick={loadGEX} style={{fontSize:10,color:'#d4d4d8',border:'1px solid rgba(255,255,255,.1)',borderRadius:8,padding:'6px 14px',background:'transparent',cursor:'pointer'}}>Retry</button>
            </div>
          )}

          {visibleData.map(d => {
            const barW  = (Math.abs(d.gamma)/maxAbs)*43;
            const isCur = price!=null && Math.abs(d.strike-Math.round(price))<0.5;
            const isRnd = d.strike%5===0;
            const dist  = price!=null ? Math.abs(d.strike-price) : 99;
            const isCW  = d.strike===callWall;
            const isPW  = d.strike===putWall;
            const barH  = Math.max(4, rowH*0.55);
            const fs    = Math.max(9, Math.min(13, rowH*0.55));
            const lc    = isCur?'#fcd34d':isRnd?'#e4e4e7':dist<=3?'#a1a1aa':'#71717a';

            return (
              <div key={d.strike} style={{height:rowH,display:'flex',alignItems:'center'}}>
                <div className="mono" style={{width:44,textAlign:'right',paddingRight:8,flexShrink:0,fontSize:fs,color:lc,fontWeight:isCur||isRnd?600:400,fontVariantNumeric:'tabular-nums'}}>
                  {d.strike}
                </div>
                <div style={{flex:1,position:'relative',display:'flex',alignItems:'center',height:'100%'}}>
                  <div style={{position:'absolute',left:'50%',top:0,bottom:0,width:1,background:'rgba(255,255,255,.08)'}}/>

                  {d.gamma<0 && (
                    <div style={{position:'absolute',right:'50%',height:barH,borderRadius:'2px 0 0 2px',width:`${barW}%`,background:'linear-gradient(to left,rgba(244,63,94,.95),rgba(244,63,94,.45))',boxShadow:isPW?'0 0 10px rgba(244,63,94,.5)':'0 0 3px rgba(244,63,94,.2)',transition:'width .5s cubic-bezier(.22,1,.36,1)'}}/>
                  )}
                  {d.gamma>0 && (
                    <div style={{position:'absolute',left:'50%',height:barH,borderRadius:'0 2px 2px 0',width:`${barW}%`,background:'linear-gradient(to right,rgba(52,211,153,.95),rgba(52,211,153,.45))',boxShadow:isCW?'0 0 10px rgba(52,211,153,.5)':'0 0 3px rgba(52,211,153,.2)',transition:'width .5s cubic-bezier(.22,1,.36,1)'}}/>
                  )}

                  {isCur && (
                    <>
                      <div style={{position:'absolute',left:0,right:0,height:1,zIndex:10,background:'repeating-linear-gradient(to right,rgba(252,211,77,.75) 0 3px,transparent 3px 7px)'}}/>
                      <div style={{position:'absolute',right:0,top:'50%',transform:'translateY(-50%)',zIndex:20,display:'flex',alignItems:'center',gap:4}}>
                        <div style={{width:6,height:6,borderRadius:'50%',background:'#fcd34d',boxShadow:'0 0 8px rgba(252,211,77,.9)',flexShrink:0}}/>
                        <div style={{flexShrink:0}}>
                          <div className="mono" style={{background:'#fcd34d',color:'#06080C',fontWeight:700,fontSize:11,padding:'2px 6px',borderRadius:3,lineHeight:1}}>
                            {price?.toFixed(2)}
                          </div>
                          {pct!=null && (
                            <div className="mono" style={{fontSize:9,fontWeight:600,marginTop:2,textAlign:'right',color:isUp?'#6ee7b7':'#fda4af'}}>
                              {isUp?'+':''}{pct}%
                            </div>
                          )}
                        </div>
                      </div>
                    </>
                  )}

                  {(isCW||isPW)&&!isCur && (
                    <div className="mono" style={{position:'absolute',[isCW?'right':'left']:4,fontSize:8,textTransform:'uppercase',fontWeight:700,color:isCW?'rgba(167,243,208,.6)':'rgba(253,164,175,.6)'}}>
                      {isCW?'C·W':'P·W'}
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>

        <div style={{flexShrink:0,padding:'8px 20px',borderTop:'1px solid rgba(255,255,255,.06)',display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8}}>
          {[
            {label:'Net Γ', val:gammaData.length?fmtGEX(netGamma):'—', color:netGamma>=0?'#34d399':'#f43f5e'},
            {label:'Flip',  val:flipPoint!=null?String(flipPoint):'—', color:'#e4e4e7'},
            {label:'C·Wall',val:callWall!=null?String(callWall):'—',   color:'#34d399'},
            {label:'P·Wall',val:putWall!=null?String(putWall):'—',     color:'#f43f5e'},
          ].map(s=>(
            <div key={s.label}>
              <div style={{fontSize:8,color:'#52525b',textTransform:'uppercase',letterSpacing:'.1em',marginBottom:2}}>{s.label}</div>
              <div className="mono" style={{fontSize:12,fontWeight:500,color:s.color}}>{s.val}</div>
            </div>
          ))}
        </div>

        <div style={{flexShrink:0,margin:'4px 12px 12px',borderRadius:12,border:'1px solid rgba(255,255,255,.08)',background:'linear-gradient(135deg,rgba(255,255,255,.04),transparent)',padding:12}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <svg width="10" height="10" viewBox="0 0 10 10">
                <circle cx="5" cy="5" r="2" fill="#fcd34d"/>
                <circle cx="5" cy="5" r="4" fill="none" stroke="#fcd34d" strokeWidth=".5" opacity=".5"/>
              </svg>
              <span style={{fontSize:9,color:'#d4d4d8',textTransform:'uppercase',letterSpacing:'.2em',fontWeight:600}}>Analysis</span>
            </div>
            <span className="mono" style={{fontSize:8,color:'#3f3f46',textTransform:'uppercase',letterSpacing:'.1em'}}>
              {gexStatus==='loading'?'refreshing…':gexStatus==='error'?'stale':'30s refresh'}
            </span>
          </div>
          {insights.length===0
            ? <div className="mono" style={{fontSize:10,color:'#52525b'}}>Waiting for data…</div>
            : insights.map((ins,i)=>(
                <div key={i} style={{display:'flex',alignItems:'center',gap:8,marginBottom:i<insights.length-1?6:0}}>
                  <span className="mono" style={{fontSize:7,fontWeight:700,padding:'2px 4px',borderRadius:4,width:40,textAlign:'center',flexShrink:0,...toneStyle(ins.tone)}}>
                    {ins.tag}
                  </span>
                  <span className="mono" style={{fontSize:11,color:'#e4e4e7',lineHeight:1.3}}>{ins.text}</span>
                </div>
              ))
          }
        </div>
      </div>

      {showExp && (
        <div className="fdin" onClick={()=>setShowExp(false)} style={{position:'fixed',inset:0,zIndex:50,background:'rgba(0,0,0,.65)',backdropFilter:'blur(8px)',display:'flex',alignItems:'flex-end',justifyContent:'center'}}>
          <div onClick={e=>e.stopPropagation()} style={{width:'100%',maxWidth:448,background:'#0C1018',borderTop:'1px solid rgba(255,255,255,.1)',borderRadius:'24px 24px 0 0',padding:'20px 20px 48px'}}>
            <div style={{width:40,height:4,borderRadius:2,background:'rgba(255,255,255,.15)',margin:'0 auto 20px'}}/>
            <div style={{fontSize:11,color:'#52525b',textTransform:'uppercase',letterSpacing:'.2em',marginBottom:12}}>Select Expiration</div>
            {exps.map(item=>(
              <button key={item.v} onClick={()=>{setExp(item.v);setShowExp(false);}} style={{width:'100%',display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 14px',borderRadius:12,background:exp===item.v?'rgba(255,255,255,.06)':'transparent',border:'none',cursor:'pointer',color:'#fff',marginBottom:2}}>
                <div style={{textAlign:'left'}}>
                  <div style={{fontSize:14,fontWeight:500}}>{item.l}</div>
                  <div className="mono" style={{fontSize:10,color:'#52525b'}}>{item.s}</div>
                </div>
                {exp===item.v && <div style={{width:6,height:6,borderRadius:'50%',background:'#fcd34d'}}/>}
              </button>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
